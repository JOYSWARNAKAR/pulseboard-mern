version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: pulseboard-mongodb
    environment:
      MONGO_INITDB_DATABASE: pulseboard
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - pulseboard-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pulseboard-backend
    environment:
      MONGODB_URI: mongodb://mongodb:27017/pulseboard
      PORT: 5000
      NODE_ENV: development
      JWT_SECRET: dev_secret_key_change_in_production
      JWT_EXPIRE: 7d
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - pulseboard-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pulseboard-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pulseboard-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  pulseboard-network:
    driver: bridge
